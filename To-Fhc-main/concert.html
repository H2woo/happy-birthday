<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHC生日快乐捏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #ffbbeb 0%, #fcfcfc 50%, #fcbbdb 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  /* 手机端旋转（由JS控制） */
  body.rotate90 {
    background: #000;
  }
  body.rotate90 .rotate-wrap {
    transform: rotate(90deg);
    transform-origin: center center;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vh;
    height: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  body.rotate90 .rotate-wrap canvas {
    flex-shrink: 0;
  }
  body.rotate90 #controls {
    transform: rotate(0deg);
  }
  #controls {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    z-index: 10;
  }
  #controls button {
    font-family: 'Courier New', monospace;
    cursor: pointer;
    border-radius: 8px;
    font-size: 17px;
    padding: 10px 28px;
    border: 2px solid;
  }
  #btnBGM {
    background: #555;
    border-color: #555;
    color: #ccc;
  }
  #btnBGM:hover { background: #666; }
  #btnBGM.on { background: #e74c3c; border-color: #e74c3c; }
  #btnFlower {
    background: #e74c3c;
    border-color: #ff6b6b;
    color: #fff;
    box-shadow: 0 0 20px rgba(231,76,60,0.4);
  }
  #btnFlower:hover {
    background: #ff6b6b;
    box-shadow: 0 0 30px rgba(231,76,60,0.7);
  }
  /* 横屏提示 - 角落小标签 */
  .orientation-hint {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 99999;
    display: none;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }
  .orientation-hint.show {
    display: flex;
  }
  .orientation-hint-icon {
    display: inline-block;
    animation: rotate-phone 2s ease-in-out infinite;
    font-size: 16px;
  }
  @keyframes rotate-phone {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }
  #disclaimer {
    position: fixed;
    bottom: 80px;
    left: 10px;
    width: 160px;
    font-size: 10px;
    line-height: 1.4;
    color: #000;
    font-family: 'Courier New', monospace;
    z-index: 5;
    pointer-events: none;
    user-select: none;
    text-align: left;
    opacity: 0.5;
  }
  #chestModal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  #chestModal img {
    max-width: 80vw;
    max-height: 80vh;
    border: 3px solid #DAA520;
    border-radius: 4px;
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<div class="rotate-wrap">
  <canvas id="c"></canvas>
  <div id="controls">
    <button id="btnBGM" class="on">♪ BGM</button>
    <button id="btnFlower">🌸 送花</button>
  </div>
  <div id="disclaimer">本项目BGM源文件为互联网掉落自动拾取<br>采用开源项目seed-vc transformer<br>且并不将用于盈利<br>无任何侵权意图</div>
  <div id="chestModal"><img id="chestImg" src=""></div>
  <div id="orientationHint" class="orientation-hint">
    <span class="orientation-hint-icon">↻</span>
    <span>横屏体验更佳</span>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

// ========== RESPONSIVE SCALING ==========
function fitCanvas() {
  const scaleX = window.innerWidth / W;
  const scaleY = window.innerHeight / H;
  const scale = Math.min(scaleX, scaleY);
  canvas.style.width = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// ========== IMAGE ==========
const PLAYER_IMG = new Image();
PLAYER_IMG.src = 'image.png';
const PS = { x: 377, y: 225, w: 527, h: 821 };
let playerSprite = null;
PLAYER_IMG.onload = function() {
  playerSprite = document.createElement('canvas');
  playerSprite.width = 60;
  playerSprite.height = 96;
  const pctx = playerSprite.getContext('2d');
  pctx.drawImage(PLAYER_IMG, PS.x, PS.y, PS.w, PS.h, 0, 0, 60, 96);
};

// ========== BACKGROUND IMAGE ==========
const BG_IMG = new Image();
BG_IMG.src = 'swing.png';
let bgReady = false;
BG_IMG.onload = function() {
  bgReady = BG_IMG.complete && BG_IMG.naturalWidth > 0;
};

// ========== BGM ==========
const bgm = new Audio('BGM.mp3');
bgm.loop = true;
bgm.volume = 0.5;
let bgmPlaying = false;
function resumeBGM() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  document.getElementById('btnBGM').textContent = '♪ BGM 开';
  document.getElementById('btnBGM').classList.add('on');
  const playPromise = bgm.play();
  if (playPromise) {
    playPromise.catch(() => {
      // 自动播放被浏览器阻止，还原状态
      bgmPlaying = false;
      document.getElementById('btnBGM').textContent = '♪ BGM';
      document.getElementById('btnBGM').classList.remove('on');
    });
  }
}
function pauseBGM() {
  bgmPlaying = false;
  bgm.pause();
  document.getElementById('btnBGM').textContent = '♪ BGM 关';
  document.getElementById('btnBGM').classList.remove('on');
}
document.getElementById('btnBGM').addEventListener('click', () => { bgmPlaying ? pauseBGM() : resumeBGM(); });
// 使用 Web Audio API 解锁音频（兼容更多移动浏览器）
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function unlockAudio() {
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().then(() => {
      // 音频上下文已解锁，尝试播放BGM
      if (!bgmPlaying) resumeBGM();
    });
  } else if (!bgmPlaying) {
    resumeBGM();
  }
}
// 页面加载后尝试解锁音频
unlockAudio();
// 首次点击时再次尝试
document.addEventListener('click', unlockAudio, { once: true });
// 用户触摸时也尝试
document.addEventListener('touchstart', unlockAudio, { once: true });

// ========== FLOWERS ==========
const flowerColors = ['#FF6B6B','#FF69B4','#FFB6C1','#FF1493','#FF4500','#FFD700','#FFA07A','#FF6347'];
function spawnFlowers() {
  for (let i = 0; i < 20; i++) {
    const baseX = 400 + (Math.random() - 0.5) * 300;
    state.flowers.push({
      x: baseX + (Math.random() - 0.5) * 100,
      y: 580 + Math.random() * 40,
      vx: (Math.random() - 0.5) * 3,
      vy: -6 - Math.random() * 5,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.1,
      size: 6 + Math.random() * 8,
      life: 100 + Math.random() * 60,
      maxLife: 160,
      color: flowerColors[Math.floor(Math.random() * flowerColors.length)],
      petalColor: flowerColors[Math.floor(Math.random() * flowerColors.length)],
    });
  }
}
document.getElementById('btnFlower').addEventListener('click', spawnFlowers);

// ========== CHEST IMAGES ==========
const chestImgs = [];
for (let i = 1; i <= 4; i++) {
  const img = new Image();
  img.src = 'Pic/' + i + '.jpg';
  chestImgs.push(img);
}

// ========== SETTINGS ==========
let lightShow = true;
let showCrowd = true;

// ========== STATE ==========
const state = {
  time: 0,
  frame: 0,
  notes: [],
  sparkles: [],
  flowers: [],
  flowerPile: [],
  chests: [],
  chestSpawnTimer: 0,
  lightAngle: 0,
  singer: {
    x: 400,
    targetX: 400,
    moveTimer: 0,
    jumpVel: 0,
    jumpY: 0,
    jumping: false,
    facingLeft: false,
  },
  camera: {
    panX: 0, panY: 0,
    zoom: 1,
    rot: 0,
    t: 0,
  },
};
const STAGE_Y = 440;
const STAGE_H = 160;

// ========== UPDATE ==========
function spawnNote() {
  state.notes.push({
    x: 400 + (Math.random() - 0.5) * 60,
    y: 300 + Math.random() * 30,
    vx: (Math.random() - 0.5) * 0.8,
    vy: -1.2 - Math.random() * 1.5,
    life: 80 + Math.random() * 40,
    maxLife: 120,
    type: Math.floor(Math.random() * 3),
    size: 10 + Math.random() * 8,
  });
}
function spawnSparkle(x, y) {
  state.sparkles.push({
    x, y, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2,
    life: 30 + Math.random() * 20, maxLife: 50,
    size: 2 + Math.random() * 3,
    color: ['#FFD700','#FF6B6B','#4ECDC4','#FF69B4','#FFA500'][Math.floor(Math.random()*5)],
  });
}

function update() {
  state.frame++;
  const dt = 1/60;
  state.time += dt;

  // Spawn music notes
  const beatPhase = Math.sin(state.time * Math.PI * 4);
  if (beatPhase > 0.85 && state.frame % 2 === 0) {
    if (Math.random() < 0.6) spawnNote();
  }

  // Update notes
  for (let i = state.notes.length - 1; i >= 0; i--) {
    const n = state.notes[i];
    n.x += n.vx; n.y += n.vy; n.vy += 0.02;
    n.life--;
    if (n.life <= 0) state.notes.splice(i, 1);
  }
  // Update sparkles
  for (let i = state.sparkles.length - 1; i >= 0; i--) {
    const s = state.sparkles[i];
    s.x += s.vx; s.y += s.vy;
    s.life--;
    if (s.life <= 0) state.sparkles.splice(i, 1);
  }

  // Update flowers
  for (let i = state.flowers.length - 1; i >= 0; i--) {
    const f = state.flowers[i];
    f.x += f.vx;
    f.vy += 0.15;
    f.y += f.vy;
    f.rot += f.rotV;
    f.life--;
    if (f.life <= 0 || f.y > H + 20) {
      // Add to pile at bottom
      if (f.y > STAGE_Y + 20 && state.flowerPile.length < 300) {
        state.flowerPile.push({
          x: 100 + Math.random() * 600,
          y: STAGE_Y + 30 + Math.random() * 30 + state.flowerPile.length * 0.3,
          size: 4 + Math.random() * 6,
          color: f.color,
          rot: Math.random() * Math.PI * 2,
        });
      }
      state.flowers.splice(i, 1);
    }
  }

  // Chest spawn every 10 seconds (max 4)
  state.chestSpawnTimer++;
  if (state.chestSpawnTimer >= 600 && state.chests.length < 4 && !state.chests.some(c => !c.opened)) {
    state.chestSpawnTimer = 0;
    const side = Math.random() < 0.5 ? -1 : 1;
    state.chests.push({
      x: 400 + side * (280 + Math.random() * 100),
      y: STAGE_Y - 30 - Math.random() * 20,
      opened: false,
      idx: state.chests.length,
      bob: Math.random() * Math.PI * 2,
    });
  }

  // Singer AI: move left/right
  const s = state.singer;
  s.moveTimer--;
  if (s.moveTimer <= 0) {
    s.targetX = 200 + Math.random() * 400;
    s.moveTimer = 120 + Math.random() * 180;
    s.facingLeft = s.targetX < s.x;
  }
  if (Math.abs(s.x - s.targetX) > 2) {
    s.x += (s.targetX - s.x) * 0.04;
  }

  // Singer jump
  if (!s.jumping && state.frame % 180 < 5 && Math.random() < 0.3) {
    s.jumping = true;
    s.jumpVel = -7 - Math.random() * 2;
  }
  if (s.jumping) {
    s.jumpY += s.jumpVel;
    s.jumpVel += 0.5;
    if (s.jumpY >= 0) {
      s.jumping = false;
      s.jumpVel = 0;
      s.jumpY = 0;
    }
  }

  // Background camera movement (dramatic, ever-changing)
  state.camera.t += dt;
  const ct = state.camera.t;
  state.camera.panX = Math.sin(ct * 0.12) * 80 + Math.sin(ct * 0.06) * 50;
  state.camera.panY = Math.cos(ct * 0.08) * 60 + Math.sin(ct * 0.14) * 30;
  state.camera.zoom = 1 + Math.sin(ct * 0.05) * 0.08 + Math.sin(ct * 0.1) * 0.04;
  state.camera.rot = Math.sin(ct * 0.03) * 0.03 + Math.cos(ct * 0.07) * 0.02;

  // Light angle
  if (lightShow) state.lightAngle += 0.008;

  // Sparkles on stage
  if (state.frame % 5 === 0 && Math.random() < 0.3) {
    spawnSparkle(200 + Math.random() * 400, STAGE_Y + 10);
  }
}

// ========== RENDER ==========
function drawStage() {
  const grad = ctx.createLinearGradient(0, STAGE_Y, 0, H);
  grad.addColorStop(0, '#5D3A1A');
  grad.addColorStop(0.15, '#8B5E3C');
  grad.addColorStop(0.5, '#6B4226');
  grad.addColorStop(1, '#3A1F0D');
  ctx.fillStyle = grad;
  ctx.fillRect(0, STAGE_Y, W, STAGE_H);

  ctx.fillStyle = '#DAA520';
  ctx.fillRect(0, STAGE_Y - 4, W, 6);
  ctx.fillStyle = '#B8860B';
  ctx.fillRect(0, STAGE_Y - 2, W, 2);

  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1;
  for (let y = STAGE_Y + 20; y < H; y += 28) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let x = 0; x < W; x += 120) {
    ctx.beginPath(); ctx.moveTo(x, STAGE_Y); ctx.lineTo(x, H); ctx.stroke();
  }

  const lightCols = ['#FF0000', '#FFD700', '#00FF00', '#4ECDC4', '#FF6B6B', '#FFD700'];
  for (let i = 0; i < 20; i++) {
    const lx = 40 + i * 38;
    const pulse = Math.sin(state.time * 3 + i * 0.8) * 0.3 + 0.7;
    ctx.fillStyle = lightCols[i % lightCols.length];
    ctx.globalAlpha = pulse * 0.6;
    ctx.fillRect(lx, STAGE_Y - 3, 20, 3);
    ctx.shadowColor = lightCols[i % lightCols.length];
    ctx.shadowBlur = 8;
    ctx.fillRect(lx, STAGE_Y - 3, 20, 3);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawCurtains() {
  const cGradL = ctx.createLinearGradient(0, 0, 80, 0);
  cGradL.addColorStop(0, '#4A0000');
  cGradL.addColorStop(0.3, '#8B0000');
  cGradL.addColorStop(0.6, '#DC143C');
  cGradL.addColorStop(0.8, '#8B0000');
  cGradL.addColorStop(1, '#4A0000');
  ctx.fillStyle = cGradL;
  ctx.fillRect(0, 0, 70, STAGE_Y);
  for (let x = 8; x < 70; x += 12) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x, 0, 4, STAGE_Y);
  }
  for (let x = -10; x < 80; x += 16) {
    ctx.fillStyle = '#DC143C';
    ctx.beginPath();
    ctx.arc(x + 8, 0, 12, Math.PI, 0);
    ctx.fill();
  }
  const cGradR = ctx.createLinearGradient(W-70, 0, W, 0);
  cGradR.addColorStop(0, '#4A0000');
  cGradR.addColorStop(0.2, '#8B0000');
  cGradR.addColorStop(0.4, '#DC143C');
  cGradR.addColorStop(0.7, '#8B0000');
  cGradR.addColorStop(1, '#4A0000');
  ctx.fillStyle = cGradR;
  ctx.fillRect(W-70, 0, 70, STAGE_Y);
  for (let x = W-70; x < W; x += 12) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x, 0, 4, STAGE_Y);
  }
  for (let x = W-70; x < W+10; x += 16) {
    ctx.fillStyle = '#DC143C';
    ctx.beginPath();
    ctx.arc(x + 8, 0, 12, Math.PI, 0);
    ctx.fill();
  }
}

function drawSpeakers() {
  const drawSpeaker = (sx, sy) => {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(sx, sy, 70, 90);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, 70, 90);
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(sx + 6 + i * 13, sy + 12, 10, 40);
    }
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(sx + 35, sy + 62, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(sx + 35, sy + 62, 20, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(sx + 35, sy + 62, 8, 0, Math.PI * 2);
    ctx.stroke();
    const blink = Math.sin(state.time * 2) > 0;
    ctx.fillStyle = blink ? '#00FF00' : '#006600';
    ctx.beginPath();
    ctx.arc(sx + 10, sy + 6, 3, 0, Math.PI * 2);
    ctx.fill();
    if (blink) {
      ctx.shadowColor = '#00FF00'; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(sx + 10, sy + 6, 3, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  };
  drawSpeaker(85, STAGE_Y - 95);
  drawSpeaker(W - 155, STAGE_Y - 95);
}

function drawBackground() {
  if (bgReady) {
    // Camera transform only on background
    const cam = state.camera;
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.rotate(cam.rot);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-W / 2 + cam.panX, -H / 2 + cam.panY);
    // Draw larger to cover edges during zoom
    const bgEx = 150;
    ctx.drawImage(BG_IMG, -bgEx, -bgEx, W + bgEx * 2, H + bgEx * 2);
    ctx.restore();
  } else {
    // Fallback gradient
    const grad = ctx.createLinearGradient(0, 0, 0, STAGE_Y);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.3, '#0f0f3a');
    grad.addColorStop(0.6, '#1a0a2e');
    grad.addColorStop(1, '#2a0a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, STAGE_Y);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    const starPositions = [
      [60,30],[150,60],[250,25],[380,45],[500,20],[620,50],[730,35],
      [100,80],[300,70],[550,75],[700,60],[50,110],[420,90],[650,100],
      [200,120],[470,115],[580,40],[50,55],[750,90],[330,30],
    ];
    for (const [sx, sy] of starPositions) {
      const twinkle = Math.sin(state.time * 2 + sx * 0.1) * 0.3 + 0.7;
      ctx.globalAlpha = twinkle * 0.6;
      ctx.fillRect(sx, sy, 2, 2);
      ctx.globalAlpha = 1;
    }
  }
}

function drawStageLights() {
  if (!lightShow) return;
  const colors = [
    { r: 255, g: 215, b: 0, a: 0.06 },
    { r: 255, g: 100, b: 50, a: 0.05 },
    { r: 78, g: 205, b: 196, a: 0.05 },
    { r: 255, g: 105, b: 180, a: 0.04 },
  ];
  for (let i = 0; i < 4; i++) {
    const angle = state.lightAngle + i * Math.PI / 2;
    const sweepX = 400 + Math.sin(angle * 0.7 + i) * 250;
    ctx.save();
    const grad = ctx.createRadialGradient(sweepX, 30, 0, sweepX, 30, 300);
    const c = colors[i];
    grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},0.15)`);
    grad.addColorStop(0.5, `rgba(${c.r},${c.g},${c.b},0.06)`);
    grad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(sweepX - 10, 0);
    ctx.lineTo(sweepX - 180, STAGE_Y);
    ctx.lineTo(sweepX + 180, STAGE_Y);
    ctx.lineTo(sweepX + 10, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    ctx.save();
    const spotGrad = ctx.createRadialGradient(sweepX, STAGE_Y + 10, 0, sweepX, STAGE_Y + 10, 80);
    spotGrad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},0.12)`);
    spotGrad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
    ctx.fillStyle = spotGrad;
    ctx.beginPath();
    ctx.ellipse(sweepX, STAGE_Y + 10, 80, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  for (let side = 0; side < 2; side++) {
    const fx = side === 0 ? 75 : W - 75;
    const color = side === 0 ? '#FF6B6B' : '#4ECDC4';
    ctx.fillStyle = '#333';
    ctx.fillRect(fx - 4, 10, 8, 15);
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.fillRect(fx - 2, 12, 4, 10);
    ctx.shadowBlur = 0;
  }
}

function drawCrowd() {
  if (!showCrowd) return;
  const crowdY = STAGE_Y + 10;
  const colors = ['#2a2a3e', '#1a1a2e', '#3a2a2e', '#222244', '#2a1a1a', '#1a2a2a'];
  for (let i = 0; i < 30; i++) {
    const cx = 100 + i * 21 + Math.sin(state.time + i) * 2;
    const cy = crowdY + 35 + Math.sin(i * 2.3) * 15;
    const bounce = Math.sin(state.time * 2 + i * 0.5) * 2;
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(cx - 6, cy - 10 + bounce, 12, 16);
    const headColors = ['#FFD5B8','#F5CBA7','#DEB887','#C4A882','#F0C8A0','#E8C090'];
    ctx.fillStyle = headColors[i % headColors.length];
    ctx.fillRect(cx - 5, cy - 20 + bounce, 10, 11);
    if (i % 3 === 0) {
      ctx.fillStyle = headColors[i % headColors.length];
      ctx.fillRect(cx - 10, cy - 8 + bounce, 4, 8);
      ctx.fillRect(cx + 6, cy - 8 + bounce, 4, 8);
    }
  }
}

function drawPlayer() {
  const s = state.singer;
  const px = s.x;
  const standY = STAGE_Y - 4;
  const bounce = Math.sin(state.time * 4) * 3;
  const stretch = Math.sin(state.time * 4 + 0.5) * 0.02 + 1;
  const pw = 80, ph = 128;
  const py = standY - ph - Math.abs(bounce) * 0.5 + s.jumpY;
  const ppx = px - pw / 2;
  const flip = s.facingLeft ? -1 : 1;

  // Arms
  const armSwing = Math.sin(state.time * 3) * 0.3 + 0.3;
  const armSwing2 = Math.sin(state.time * 3 + 1.5) * 0.25 + 0.25;
  ctx.fillStyle = '#2a1a0a';
  ctx.save();
  ctx.translate(px - flip * 8, py + 24);
  ctx.rotate(-armSwing * flip);
  ctx.fillRect(-4, 0, 8, 28);
  ctx.restore();
  ctx.save();
  ctx.translate(px + flip * (pw/2 + 8), py + 20);
  ctx.rotate(armSwing2 * flip);
  ctx.fillRect(-4, 0, 8, 26);
  ctx.restore();

  // Body
  ctx.save();
  ctx.translate(px, py + ph/2);
  ctx.scale(flip, stretch);
  ctx.translate(-px, -py - ph/2);
  if (playerSprite) {
    try { ctx.drawImage(playerSprite, ppx, py, pw, ph); }
    catch(e) { ctx.fillStyle = '#e74c3c'; ctx.fillRect(ppx, py, pw, ph); }
  } else if (PLAYER_IMG.complete && PLAYER_IMG.naturalWidth > 0) {
    try { ctx.drawImage(PLAYER_IMG, PS.x, PS.y, PS.w, PS.h, ppx, py, pw, ph); }
    catch(e) { ctx.fillStyle = '#e74c3c'; ctx.fillRect(ppx, py, pw, ph); }
  } else {
    ctx.fillStyle = '#1a0a2e';
    ctx.fillRect(ppx, py, pw, ph);
    ctx.fillStyle = '#F5CBA7';
    ctx.fillRect(ppx + pw/2 - 12, py + 10, 24, 16);
  }
  ctx.restore();

  // Microphone
  const micY = py + 55 + Math.sin(state.time * 4) * 2;
  const micDir = flip;
  ctx.fillStyle = '#888';
  ctx.fillRect(px + micDir * 22, micY, 4, 30);
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(px + micDir * 24, micY, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.arc(px + micDir * 24, micY, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(px + micDir * 22, micY - 4 + i * 2, 4, 1);
  }

  // Music notes
  for (const n of state.notes) {
    const alpha = n.life / n.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 8;
    if (n.type === 0) {
      ctx.fillRect(n.x - 2, n.y - n.size/2, 4, n.size * 0.7);
      ctx.fillRect(n.x - 2, n.y - n.size/2, n.size * 0.5, 4);
      ctx.beginPath();
      ctx.arc(n.x - 1, n.y - n.size/2 + 4, 4, 0, Math.PI * 2);
      ctx.fill();
    } else if (n.type === 1) {
      ctx.fillRect(n.x - 3, n.y - n.size/2, 4, n.size * 0.6);
      ctx.fillRect(n.x + 4, n.y - n.size/2 + 2, 4, n.size * 0.6);
      ctx.fillRect(n.x - 3, n.y - n.size/2, n.size * 0.6, 4);
      ctx.beginPath();
      ctx.arc(n.x - 2, n.y - n.size/2 + 4, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(n.x + 5, n.y - n.size/2 + 6, 4, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(n.x - 2, n.y - n.size/2, 4, n.size * 0.8);
      ctx.fillRect(n.x - n.size/2, n.y - 2, n.size, 4);
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawFlowers() {
  for (const f of state.flowers) {
    const alpha = Math.min(1, f.life / 30);
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.globalAlpha = alpha;
    const s = f.size;
    // Petals
    ctx.fillStyle = f.color;
    for (let p = 0; p < 5; p++) {
      const a = (p / 5) * Math.PI * 2;
      ctx.save();
      ctx.rotate(a);
      ctx.beginPath();
      ctx.ellipse(s * 0.5, 0, s * 0.5, s * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // Center
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.25, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawSparkles() {
  for (const s of state.sparkles) {
    const alpha = s.life / s.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = s.color;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 4;
    const sz = s.size * (0.5 + 0.5 * alpha);
    ctx.fillRect(s.x - sz/2, s.y - sz/2, sz, sz);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawFlowerPile() {
  for (const p of state.flowerPile) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.8;
    // Simple flower blob
    for (let d = 0; d < 5; d++) {
      ctx.save();
      ctx.rotate((d / 5) * Math.PI * 2);
      ctx.beginPath();
      ctx.ellipse(p.size * 0.4, 0, p.size * 0.4, p.size * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(0, 0, p.size * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawChests() {
  for (const ch of state.chests) {
    if (ch.opened) continue;
    ch.bob += 0.03;
    const by = ch.y + Math.sin(ch.bob) * 2;
    // Chest body
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(ch.x - 16, by - 12, 32, 24);
    // Chest lid
    ctx.fillStyle = '#A0522D';
    ctx.fillRect(ch.x - 18, by - 16, 36, 6);
    // Gold trim
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(ch.x - 14, by - 10, 28, 3);
    // Lock
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(ch.x - 3, by - 6, 6, 6);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(ch.x - 1, by - 4, 2, 4);
    // Glow
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 12;
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    ctx.fillRect(ch.x - 20, by - 18, 40, 34);
    ctx.shadowBlur = 0;
  }
}

function drawTitle() {
  const pulse = Math.sin(state.time * 2) * 0.1 + 0.9;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(W/2 - 220, 8, 440, 50);
  ctx.strokeStyle = '#DAA520';
  ctx.lineWidth = 1;
  ctx.strokeRect(W/2 - 220, 8, 440, 50);
  ctx.fillStyle = '#FFD700';
  ctx.globalAlpha = pulse;
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 10;
  ctx.fillText('♪ FHC生日全国巡回演唱会 ♪', W/2, 23);
  ctx.fillText('不跟着一起呐喊FHC!FHC!FHC!就会超级无敌暴怒生气', W/2, 48);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawStageLights();
  drawCurtains();
  drawSpeakers();
  drawStage();
  drawCrowd();
  drawPlayer();
  drawSparkles();
  drawFlowers();
  drawFlowerPile();
  drawChests();
  drawTitle();
}

// ========== LOOP ==========
(function loop() {
  try { update(); render(); } catch(e) { console.error(e); }
  requestAnimationFrame(loop);
})();

// ========== CHEST CLICK ==========
function showChestImage(idx) {
  const modal = document.getElementById('chestModal');
  const img = document.getElementById('chestImg');
  img.src = chestImgs[idx].src;
  modal.style.display = 'flex';
}
document.getElementById('chestModal').addEventListener('click', function() {
  this.style.display = 'none';
});
canvas.addEventListener('click', function(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top) * sy;
  for (const ch of state.chests) {
    if (ch.opened) continue;
    if (mx > ch.x - 18 && mx < ch.x + 18 && my > ch.y - 16 && my < ch.y + 14) {
      ch.opened = true;
      showChestImage(ch.idx);
      break;
    }
  }
});

console.log('像素演唱会已开幕！');

// ========== 手机端旋转90°横屏显示 ==========
// 检测是否为手机（宽<768px）且竖屏
function applyMobileRotate() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const isMobilePortrait = w < 768 && h > w;
  document.body.classList.toggle('rotate90', isMobilePortrait);
}
applyMobileRotate();
window.addEventListener('resize', applyMobileRotate);
window.addEventListener('orientationchange', () => setTimeout(applyMobileRotate, 300));
</script>
